version: '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: cms_india
      POSTGRES_PASSWORD: cms_india_dev
      POSTGRES_DB: cms_india
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://cms_india:cms_india_dev@db:5432/cms_india
      - ENVIRONMENT=development
      - PORT=8000
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app

  celery-worker:
    build: ./backend
    command: celery -A src.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - db

  celery-beat:
    build: ./backend
    command: celery -A src.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - db

  flower:
    build: ./backend
    command: celery -A src.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - celery-worker

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000/api/v1
    depends_on:
      - backend

volumes:
  pgdata:
