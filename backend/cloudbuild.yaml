############################################################
# Cloud Build — Backend (API + Celery worker + Celery beat)
#
# Trigger path filter: backend/**
############################################################

substitutions:
  _REGION: asia-south1
  _REPO: cms-india
  _DB_USER: cms_india
  _DB_NAME: cms_india
  _REDIS_HOST: "10.0.0.3"
  _VPC_CONNECTOR: cms-india-connector
  _CLOUD_SQL_CONNECTION: ""
  _DB_PASSWORD_SECRET: cms-india-db-password
  _SECRET_KEY_SECRET: cms-india-secret-key

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # 1. Build backend image
  - name: gcr.io/cloud-builders/docker
    id: build-backend
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/backend:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/backend:latest
      - ./backend

  # 2. Push backend image
  - name: gcr.io/cloud-builders/docker
    id: push-backend
    args: [push, --all-tags, "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/backend"]
    waitFor: [build-backend]

  # 3a. Deploy backend API
  - name: gcr.io/cloud-builders/gcloud
    id: deploy-backend
    args:
      - run
      - deploy
      - cms-india-backend
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/backend:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --cpu=2
      - --memory=1Gi
      - --min-instances=1
      - --max-instances=10
      - --add-cloudsql-instances=${_CLOUD_SQL_CONNECTION}
      - --vpc-connector=projects/${PROJECT_ID}/locations/${_REGION}/connectors/${_VPC_CONNECTOR}
      - --set-env-vars=ENVIRONMENT=production,DB_USER=${_DB_USER},DB_NAME=${_DB_NAME},REDIS_URL=redis://${_REDIS_HOST}:6379/0,CELERY_BROKER_URL=redis://${_REDIS_HOST}:6379/1,CORS_ORIGINS=*
      - --update-secrets=DATABASE_URL=${_DB_PASSWORD_SECRET}:latest,SECRET_KEY=${_SECRET_KEY_SECRET}:latest
    waitFor: [push-backend]

  # 3b. Deploy Celery worker
  - name: gcr.io/cloud-builders/gcloud
    id: deploy-celery-worker
    args:
      - run
      - deploy
      - cms-india-celery-worker
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/backend:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --no-allow-unauthenticated
      - --cpu=2
      - --memory=1Gi
      - --min-instances=1
      - --max-instances=5
      - --no-cpu-throttling
      - --add-cloudsql-instances=${_CLOUD_SQL_CONNECTION}
      - --vpc-connector=projects/${PROJECT_ID}/locations/${_REGION}/connectors/${_VPC_CONNECTOR}
      - --set-env-vars=ENVIRONMENT=production,DB_USER=${_DB_USER},DB_NAME=${_DB_NAME},REDIS_URL=redis://${_REDIS_HOST}:6379/0,CELERY_BROKER_URL=redis://${_REDIS_HOST}:6379/1
      - --update-secrets=DATABASE_URL=${_DB_PASSWORD_SECRET}:latest,SECRET_KEY=${_SECRET_KEY_SECRET}:latest
      - --command=celery
      - --args=-A,src.celery_app,worker,--loglevel=info,--concurrency=4
    waitFor: [push-backend]

  # 3c. Deploy Celery beat (scheduler) — single instance
  - name: gcr.io/cloud-builders/gcloud
    id: deploy-celery-beat
    args:
      - run
      - deploy
      - cms-india-celery-beat
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/backend:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --no-allow-unauthenticated
      - --cpu=1
      - --memory=512Mi
      - --min-instances=1
      - --max-instances=1
      - --no-cpu-throttling
      - --add-cloudsql-instances=${_CLOUD_SQL_CONNECTION}
      - --vpc-connector=projects/${PROJECT_ID}/locations/${_REGION}/connectors/${_VPC_CONNECTOR}
      - --set-env-vars=ENVIRONMENT=production,DB_USER=${_DB_USER},DB_NAME=${_DB_NAME},REDIS_URL=redis://${_REDIS_HOST}:6379/0,CELERY_BROKER_URL=redis://${_REDIS_HOST}:6379/1
      - --update-secrets=DATABASE_URL=${_DB_PASSWORD_SECRET}:latest,SECRET_KEY=${_SECRET_KEY_SECRET}:latest
      - --command=celery
      - --args=-A,src.celery_app,beat,--loglevel=info
    waitFor: [push-backend]

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/backend:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/backend:latest

timeout: 1800s
